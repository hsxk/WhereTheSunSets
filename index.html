<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#111d33;--card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.10);--text:#eef2f7;--muted:#8a9bb5;
  --sun:#ffcb45;--sunset:#e76f51;--moon:#7eb8ff;--moonset:#3d7cc9;
  --ok:#4ade80;--accent:#2f7cf5;--golden:#f4a261;--blue-hour:#6784b8;
  --radius:14px;
}
html{font-size:16px;scroll-behavior:smooth;color-scheme:dark}
body{
  background:linear-gradient(150deg,var(--bg) 0%,#0d1f38 50%,var(--bg2) 100%);
  color:var(--text);min-height:100dvh;
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

/* ---- layout ---- */
.page{max-width:1320px;margin:0 auto;padding:14px}
.top-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:4px 0 8px}
.top-bar .title-group{display:flex;flex-direction:column;gap:1px;min-width:0}
.top-bar h1{font-size:clamp(1.1rem,2.5vw,1.45rem);white-space:nowrap;
  background:linear-gradient(135deg,#fff 60%,var(--sun));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .subtitle{font-size:.72rem;color:var(--muted);opacity:.7;line-height:1.3;max-width:420px;white-space:normal}
@media(max-width:600px){.top-bar .subtitle{display:none}}
.top-bar select{
  height:32px;border-radius:8px;border:1px solid var(--border);
  background:rgba(0,0,0,.3);color:var(--text);padding:0 8px;font-size:.82rem;
  cursor:pointer;
}

/* action bar */
.action-bar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:8px}
.action-bar .date-wrap{flex:0 0 auto}
.action-bar label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:3px}
.action-bar input[type="date"]{
  height:40px;border-radius:10px;border:1px solid var(--border);
  background:rgba(0,0,0,.25);color:var(--text);padding:0 10px;font-size:.9rem;width:155px;
}
.btn{
  height:40px;border-radius:10px;border:none;padding:0 16px;
  font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;transition:transform .1s,box-shadow .2s;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#2a9d8f,#2f6fdb);color:#fff;box-shadow:0 2px 12px rgba(47,111,219,.3)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(47,111,219,.45)}
.btn-secondary{background:rgba(255,255,255,.10);color:var(--text);border:1px solid var(--border)}
.btn svg{width:17px;height:17px;fill:currentColor}
.btn:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-primary.loading{opacity:.7;pointer-events:none}
@keyframes cta-pulse{0%,100%{box-shadow:0 2px 12px rgba(47,111,219,.3)}50%{box-shadow:0 4px 24px rgba(47,111,219,.6),0 0 48px rgba(47,111,219,.15)}}
.btn-primary.cta-pulse{animation:cta-pulse 2s ease-in-out 3}

/* date stepper */
.date-stepper{display:flex;align-items:center;gap:0}
.step-btn{
  width:36px;height:40px;border:1px solid var(--border);background:rgba(255,255,255,.06);
  color:var(--text);font-size:1rem;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.step-btn:first-child{border-radius:10px 0 0 10px;border-right:none}
.step-btn:last-child{border-radius:0 10px 10px 0;border-left:none}
.step-btn:hover{background:rgba(255,255,255,.12)}
.step-btn:active{background:rgba(255,255,255,.18);transform:scale(.95)}
.date-stepper input[type="date"]{border-radius:0}
#shareBtn svg{width:16px;height:16px}
@keyframes toast-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(10,22,40,.95);color:var(--text);padding:10px 20px;
  border-radius:10px;font-size:.85rem;z-index:9999;
  border:1px solid var(--border);animation:toast-in .25s ease;
  backdrop-filter:blur(8px);pointer-events:none;
}

/* slider */
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:6px 0}
.slider-row input[type="range"]{
  flex:1;height:8px;touch-action:pan-y;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.12);border-radius:999px;outline:none;
}
.slider-row input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:var(--accent);border:2px solid rgba(255,255,255,.25);
  box-shadow:0 1px 8px rgba(0,0,0,.4);
}
.slider-row input[type="range"]::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
  background:var(--accent);box-shadow:0 1px 8px rgba(0,0,0,.4);
}
@media(pointer:coarse){
  .slider-row{padding:10px 0;flex-direction:column;align-items:stretch;gap:8px}
  .slider-row input[type="range"]{height:10px}
  .slider-row input[type="range"]::-webkit-slider-thumb{width:32px;height:32px}
  .slider-row input[type="range"]::-moz-range-thumb{width:32px;height:32px}
}
.slider-row .slider-label{font-size:.8rem;color:var(--muted);min-width:150px;text-align:right}
@media(pointer:coarse){
  .slider-row .slider-label{min-width:0;text-align:left;font-size:.84rem}
}

/* status + countdown */
.info-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.status-bar{font-size:.8rem;color:var(--muted);min-height:1.2em}
.status-bar.ok{color:var(--ok)}
.countdown{font-size:.8rem;color:var(--golden);font-weight:500}

/* ---- main grid ---- */
.main-grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:940px){
  .main-grid{grid-template-columns:1.1fr 0.9fr}
  .main-grid .map-section{grid-row:1/4}
}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;backdrop-filter:blur(8px)}

/* event cards */
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.event-card{
  background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:12px;
  padding:12px 12px 12px 14px;display:flex;gap:10px;align-items:center;
  position:relative;overflow:hidden;transition:background .2s;
}
.event-card:hover{background:rgba(255,255,255,.04)}
.event-card .ev-stripe{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.event-card.sunrise .ev-stripe{background:var(--sun)}
.event-card.sunset .ev-stripe{background:var(--sunset)}
.event-card.moonrise .ev-stripe{background:var(--moon)}
.event-card.moonset .ev-stripe{background:var(--moonset)}
.event-card .ev-compass{flex:0 0 40px;height:40px;position:relative}
.event-card .ev-compass svg{width:40px;height:40px}
.event-card .ev-info{flex:1;min-width:0}
.event-card .ev-label{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.event-card .ev-label .ev-icon{font-size:1rem}
.event-card .ev-time{font-size:1.15rem;font-weight:700;margin:2px 0}
.event-card .ev-bearing{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* detail kpis */
.detail-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:10px}
.kpi{background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:10px;padding:10px}
.kpi .kpi-label{font-size:.75rem;color:var(--muted)}
.kpi .kpi-value{font-size:.92rem;font-weight:600;margin-top:3px}

/* twilight badges */
.twilight-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tw-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.78rem;padding:5px 10px;border-radius:8px;
  border:1px solid var(--border);background:rgba(0,0,0,.18);color:var(--muted);
}
.tw-badge .tw-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* map */
.map-section .map-box{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);height:380px}
@media(max-width:939px){.map-section .map-box{height:300px}}
.map-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:.78rem;color:var(--muted)}
.map-legend .ml-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:-1px}

/* sky canvas */
.sky-section{margin-top:10px}
.sky-section canvas{width:100%;height:220px;display:block;border-radius:var(--radius);background:rgba(0,0,0,.15);border:1px solid var(--border)}
@media(min-width:940px){.sky-section canvas{height:280px}}
.sky-legend{display:flex;gap:12px;margin-top:6px;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
.sky-legend .sl-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:-1px}

/* advanced */
.advanced-section{margin-top:10px}
.advanced-section summary{
  cursor:pointer;user-select:none;font-size:.85rem;color:var(--muted);padding:8px 0;
  list-style:none;display:flex;align-items:center;gap:6px;
}
.advanced-section summary::-webkit-details-marker{display:none}
.advanced-section summary::before{content:'▸';transition:transform .2s}
.advanced-section[open] summary::before{transform:rotate(90deg)}
.adv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
.adv-grid label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:3px}
.adv-grid input,.adv-grid select{
  width:100%;height:36px;border-radius:8px;border:1px solid var(--border);
  background:rgba(0,0,0,.25);color:var(--text);padding:0 8px;font-size:.85rem;
}
.adv-result{margin-top:10px;font-size:.85rem;color:var(--muted);line-height:1.6;
  padding:10px;border-radius:10px;background:rgba(0,0,0,.15);border:1px solid var(--border)}
.adv-result strong{color:var(--text)}

/* footer */
.foot{font-size:.75rem;color:rgba(138,155,181,.6);margin-top:14px;text-align:center;padding:10px 0;line-height:1.6}
.foot a{color:rgba(138,155,181,.8);text-decoration:none;border-bottom:1px dotted rgba(138,155,181,.3);transition:color .2s}
.foot a:hover{color:var(--accent)}

/* leaflet overrides */
.leaflet-control.sm-actions{
  background:rgba(10,22,40,.92);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.leaflet-control.sm-actions button{
  display:block;width:100%;height:34px;border:none;border-bottom:1px solid var(--border);
  background:transparent;color:var(--text);font-size:.8rem;font-weight:600;
  padding:0 12px;text-align:left;cursor:pointer;transition:background .15s;
}
.leaflet-control.sm-actions button:hover{background:rgba(255,255,255,.06)}
.leaflet-control.sm-actions button:last-child{border-bottom:none}

/* empty state */
.empty-hint{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:30px 20px;text-align:center;color:var(--muted);
}
.empty-hint .eh-icon{font-size:2.2rem;opacity:.5}
.empty-hint .eh-text{font-size:.9rem;line-height:1.5}

@media(max-width:500px){
  .page{padding:8px}
  .action-bar{gap:6px}
  .action-bar input[type="date"]{width:135px;height:38px}
  .btn{padding:0 12px;font-size:.84rem;height:38px}
  .step-btn{width:40px;height:38px}
  .events-grid{gap:6px}
  .event-card{padding:10px 10px 10px 12px;gap:8px}
  .event-card .ev-time{font-size:1.05rem}
  .event-card .ev-compass{flex:0 0 34px;height:34px}
  .event-card .ev-compass svg{width:34px;height:34px}
  .detail-row{grid-template-columns:1fr 1fr}
  .slider-row{margin-bottom:10px}
}
</style>
</head>
<body>
<div class="page">
  <!-- top bar -->
  <div class="top-bar">
    <div class="title-group">
      <h1 id="appTitle">Where the Sun Sets</h1>
      <div class="subtitle" id="appSubtitle"></div>
    </div>
    <select id="langSel" aria-label="Language">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
    </select>
  </div>

  <!-- action bar -->
  <div class="action-bar">
    <button class="btn btn-primary" id="locateBtn" title="GPS">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
      <span data-i18n="btn_locate">一键定位</span>
    </button>
    <div class="date-wrap">
      <label for="dateInput" data-i18n="label_date">日期</label>
      <div class="date-stepper">
        <button class="step-btn" id="prevDayBtn" aria-label="Previous day">◀</button>
        <input type="date" id="dateInput">
        <button class="step-btn" id="nextDayBtn" aria-label="Next day">▶</button>
      </div>
    </div>
    <button class="btn btn-secondary" id="todayBtn"><span data-i18n="btn_today">今天</span></button>
    <button class="btn btn-secondary" id="shareBtn" title="Share">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    </button>
  </div>

  <!-- slider -->
  <div class="slider-row">
    <input type="range" id="dateSlider" min="1" max="365" value="1">
    <span class="slider-label" id="sliderLabel">--</span>
  </div>

  <div class="info-row">
    <div id="statusBar" class="status-bar" role="status" aria-live="polite"></div>
    <div id="countdown" class="countdown" aria-live="off"></div>
  </div>

  <!-- main content -->
  <div class="main-grid">
    <!-- LEFT: map -->
    <div class="map-section card">
      <div class="map-box" id="map"></div>
      <div class="map-legend">
        <span><span class="ml-dot" style="background:var(--sun)"></span><span data-i18n="leg_sunrise">日出方向</span></span>
        <span><span class="ml-dot" style="background:var(--sunset)"></span><span data-i18n="leg_sunset">日落方向</span></span>
        <span><span class="ml-dot" style="background:var(--moon)"></span><span data-i18n="leg_moonrise">月升方向</span></span>
        <span><span class="ml-dot" style="background:var(--moonset)"></span><span data-i18n="leg_moonset">月落方向</span></span>
      </div>
    </div>

    <!-- RIGHT: data -->
    <div class="data-section">
      <!-- 4 event cards -->
      <div class="events-grid" id="eventsGrid">
        <div class="event-card sunrise">
          <div class="ev-stripe"></div>
          <div class="ev-compass" id="compassSunrise"></div>
          <div class="ev-info">
            <div class="ev-label"><span class="ev-icon">☀️</span><span data-i18n="ev_sunrise">日出</span></div>
            <div class="ev-time" id="evSunriseTime">--:--</div>
            <div class="ev-bearing" id="evSunriseDir">--</div>
          </div>
        </div>
        <div class="event-card sunset">
          <div class="ev-stripe"></div>
          <div class="ev-compass" id="compassSunset"></div>
          <div class="ev-info">
            <div class="ev-label"><span class="ev-icon">🌇</span><span data-i18n="ev_sunset">日落</span></div>
            <div class="ev-time" id="evSunsetTime">--:--</div>
            <div class="ev-bearing" id="evSunsetDir">--</div>
          </div>
        </div>
        <div class="event-card moonrise">
          <div class="ev-stripe"></div>
          <div class="ev-compass" id="compassMoonrise"></div>
          <div class="ev-info">
            <div class="ev-label"><span class="ev-icon">🌙</span><span data-i18n="ev_moonrise">月升</span></div>
            <div class="ev-time" id="evMoonriseTime">--:--</div>
            <div class="ev-bearing" id="evMoonriseDir">--</div>
          </div>
        </div>
        <div class="event-card moonset">
          <div class="ev-stripe"></div>
          <div class="ev-compass" id="compassMoonset"></div>
          <div class="ev-info">
            <div class="ev-label"><span class="ev-icon">🌑</span><span data-i18n="ev_moonset">月落</span></div>
            <div class="ev-time" id="evMoonsetTime">--:--</div>
            <div class="ev-bearing" id="evMoonsetDir">--</div>
          </div>
        </div>
      </div>

      <!-- twilight badges -->
      <div class="twilight-row" id="twilightRow"></div>

      <!-- detail kpis -->
      <div class="detail-row">
        <div class="kpi"><div class="kpi-label" data-i18n="kpi_noon">太阳正午</div><div class="kpi-value" id="kpiNoon">--</div></div>
        <div class="kpi"><div class="kpi-label" data-i18n="kpi_daylen">白昼时长</div><div class="kpi-value" id="kpiDayLen">--</div></div>
        <div class="kpi"><div class="kpi-label" data-i18n="kpi_moonillum">月面照明</div><div class="kpi-value" id="kpiMoonIllum">--</div></div>
        <div class="kpi"><div class="kpi-label" data-i18n="kpi_moonphase">月相</div><div class="kpi-value" id="kpiMoonPhase">--</div></div>
      </div>

      <!-- sky dome -->
      <div class="sky-section card">
        <canvas id="skyCanvas" aria-hidden="true"></canvas>
        <div class="sky-legend">

/* =============== state =============== */
let lang='en', lat=null, lng=null;
let leafletMap=null, obsMarker=null, tgtMarker=null, guideLayer=null;
let advPickStep=0, mapLocateBtn=null, mapClearBtn=null;
let lastBearings={sr:NaN,ss:NaN,mr:NaN,ms:NaN};
let countdownTimer=null;

/* =============== DOM =============== */
const $=id=>document.getElementById(id);
const dateInput=$('dateInput'), dateSlider=$('dateSlider'), sliderLabel=$('sliderLabel');
const statusBar=$('statusBar'), countdownEl=$('countdown');
const skyCanvas=$('skyCanvas'), skyCtx=skyCanvas.getContext('2d');
const langSel=$('langSel'), advResult=$('advResult'), twilightRow=$('twilightRow');

/* =============== i18n helpers =============== */
function t(k,v={}){
  const d=I18N[lang]||I18N.en;let s=d[k]??(I18N.en[k]??k);
  for(const[a,b] of Object.entries(v)) s=s.replaceAll(`{${a}}`,String(b));
  return s;
}
function applyI18n(){
  document.title=t('title')+' | time2log';
  $('appTitle').textContent=t('title');
  $('appSubtitle').textContent=t('subtitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)});
  if(mapLocateBtn) mapLocateBtn.textContent=t('map_locate');
  if(mapClearBtn) mapClearBtn.textContent=t('map_clear');
  langSel.value=lang;
}
function setLang(l){
  if(!I18N[l])return; lang=l; document.documentElement.lang=l;
  try{localStorage.setItem('sm.lang',l)}catch(e){}
  applyI18n(); syncSlider(); if(lat!=null) render();
}

/* =============== utility =============== */
const toRad=d=>d*Math.PI/180, toDeg=r=>r*180/Math.PI;
const normB=d=>((d%360)+360)%360;
const scAzToB=az=>normB(toDeg(az)+180);
const pad2=n=>String(n).padStart(2,'0');

const DIR_K=['dir_N','dir_NNE','dir_NE','dir_ENE','dir_E','dir_ESE','dir_SE','dir_SSE',
  'dir_S','dir_SSW','dir_SW','dir_WSW','dir_W','dir_WNW','dir_NW','dir_NNW'];
function bearName(d){return t(DIR_K[Math.round(normB(d)/22.5)%16])}
function fmtBear(d){return Number.isFinite(d)?t('dir_fmt',{deg:d.toFixed(1),name:bearName(d)}):'--'}

function fmtTime(d){
  if(!d||isNaN(+d))return t('none');
  return d.toLocaleTimeString(lang==='zh'?'zh-CN':lang,{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(d){
  if(!d||isNaN(+d))return'';
  return d.toLocaleDateString(lang==='zh'?'zh-CN':lang);
}
function fmtDur(ms){
  if(!Number.isFinite(ms)||ms<=0)return t('none');
  const m=Math.round(ms/6e4); return t('dur_fmt',{h:Math.floor(m/60),m:m%60});
}
function doy(d){return Math.floor((d-new Date(d.getFullYear(),0,1))/864e5)+1}
function daysInY(y){return(y%4===0&&y%100!==0)||y%400===0?366:365}
function doyToDate(y,n){return new Date(y,0,n)}
function fmtDI(d){return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`}
function getDate(){
  const v=dateInput.value;
  if(!v){const d=new Date();d.setHours(0,0,0,0);return d}
  const d=new Date(v+'T00:00:00'); return isNaN(+d)?null:d;
}
function isToday(d){const n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()}
function setStatus(msg,ok=false){statusBar.textContent=msg;statusBar.classList.toggle('ok',ok)}
function getObsH(){return parseFloat($('obsElev').value)||0}

/* event bearing (refined ±3min around event) */
function evBearing(time,oLa,oLo,body){
  if(!time||isNaN(+time))return NaN;
  let best=null;
  for(let s=-180;s<=180;s+=12){
    const t2=new Date(+time+s*1000);
    const p=body==='sun'?SunCalc.getPosition(t2,oLa,oLo):SunCalc.getMoonPosition(t2,oLa,oLo);
    if(!best||Math.abs(p.altitude)<best.a) best={a:Math.abs(p.altitude),az:p.azimuth};
  }
  return best?scAzToB(best.az):NaN;
}

/* =============== compass SVG =============== */
function compassSVG(bearing, color){
  if(!Number.isFinite(bearing)) return '';
  const rot = bearing; // degrees clockwise from north
  return `<svg viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
    <line x1="20" y1="2" x2="20" y2="6" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
    <line x1="20" y1="34" x2="20" y2="38" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <line x1="2" y1="20" x2="6" y2="20" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <line x1="34" y1="20" x2="38" y2="20" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <g transform="rotate(${rot} 20 20)">
      <line x1="20" y1="20" x2="20" y2="6" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="20" cy="6" r="2.5" fill="${color}"/>
    </g>
    <circle cx="20" cy="20" r="2" fill="rgba(255,255,255,.5)"/>
  </svg>`;
}

/* =============== Moon phase =============== */
const PHASES=[
  {m:.03,k:'phase_new'},{m:.22,k:'phase_waxc'},{m:.28,k:'phase_fq'},{m:.47,k:'phase_waxg'},
  {m:.53,k:'phase_full'},{m:.72,k:'phase_wang'},{m:.78,k:'phase_lq'},{m:.97,k:'phase_wanc'},{m:1,k:'phase_new'}
];
function phaseName(p){for(const x of PHASES)if(p<=x.m)return t(x.k);return'?'}
function phaseEmoji(p){
  if(p<=.0625)return'🌑';if(p<=.1875)return'🌒';if(p<=.3125)return'🌓';if(p<=.4375)return'🌔';
  if(p<=.5625)return'🌕';if(p<=.6875)return'🌖';if(p<=.8125)return'🌗';if(p<=.9375)return'🌘';return'🌑';
}

/* =============== RENDER =============== */
function render(){
  if(lat==null||lng==null)return;
  const date=getDate(); if(!date)return;

  const h0=getObsH();
  const sunT=SunCalc.getTimes(date,lat,lng,h0);
  const moonT=SunCalc.getMoonTimes(date,lat,lng);
  const moonI=SunCalc.getMoonIllumination(date);

  const srB=evBearing(sunT.sunrise,lat,lng,'sun');
  const ssB=evBearing(sunT.sunset,lat,lng,'sun');
  const mrB=evBearing(moonT.rise,lat,lng,'moon');
  const msB=evBearing(moonT.set,lat,lng,'moon');
  lastBearings={sr:srB,ss:ssB,mr:mrB,ms:msB};

  /* event cards */
  $('evSunriseTime').textContent=fmtTime(sunT.sunrise);
  $('evSunriseDir').textContent=fmtBear(srB);
  $('compassSunrise').innerHTML=compassSVG(srB,'var(--sun)');
  $('evSunsetTime').textContent=fmtTime(sunT.sunset);
  $('evSunsetDir').textContent=fmtBear(ssB);
  $('compassSunset').innerHTML=compassSVG(ssB,'var(--sunset)');
  $('evMoonriseTime').textContent=fmtTime(moonT.rise);
  $('evMoonriseDir').textContent=fmtBear(mrB);
  $('compassMoonrise').innerHTML=compassSVG(mrB,'var(--moon)');
  $('evMoonsetTime').textContent=fmtTime(moonT.set);
  $('evMoonsetDir').textContent=fmtBear(msB);
  $('compassMoonset').innerHTML=compassSVG(msB,'var(--moonset)');

  /* kpis */
  $('kpiNoon').textContent=fmtTime(sunT.solarNoon);
  const dayMs=(sunT.sunrise&&sunT.sunset)?sunT.sunset-sunT.sunrise:NaN;
  $('kpiDayLen').textContent=fmtDur(dayMs);
  $('kpiMoonIllum').textContent=(moonI.fraction*100).toFixed(1)+'%';
  $('kpiMoonPhase').textContent=phaseEmoji(moonI.phase)+' '+phaseName(moonI.phase);

  /* twilight / golden hour */
  renderTwilight(sunT);
  /* countdown */
  updateCountdown(sunT);
  /* sky dome */
  drawSky(date);
  /* map */
  drawMapGuides();
  /* advanced */
  updateAdvanced(date);

  setStatus(t('status_ok',{lat:lat.toFixed(4),lng:lng.toFixed(4),date:fmtDate(date)}),true);
}

/* =============== TWILIGHT =============== */
function renderTwilight(sunT){
  const badges=[];
  // golden hour: sun alt 0°–6° ≈ sunrise to sunrise+30min, sunset-30min to sunset
  // blue hour: sun alt -6°–-4° ≈ dawn/dusk
  const valid=d=>d instanceof Date&&!isNaN(+d);
  if(valid(sunT.sunrise)&&valid(sunT.goldenHourEnd))
    badges.push({label:t('tw_golden_am'),time:t('tw_time',{start:fmtTime(sunT.sunrise),end:fmtTime(sunT.goldenHourEnd)}),color:'var(--golden)'});
  if(valid(sunT.goldenHour)&&valid(sunT.sunset))
    badges.push({label:t('tw_golden_pm'),time:t('tw_time',{start:fmtTime(sunT.goldenHour),end:fmtTime(sunT.sunset)}),color:'var(--golden)'});
  if(valid(sunT.dawn)&&valid(sunT.sunrise))
    badges.push({label:t('tw_blue_am'),time:t('tw_time',{start:fmtTime(sunT.dawn),end:fmtTime(sunT.sunrise)}),color:'var(--blue-hour)'});
  if(valid(sunT.sunset)&&valid(sunT.dusk))
    badges.push({label:t('tw_blue_pm'),time:t('tw_time',{start:fmtTime(sunT.sunset),end:fmtTime(sunT.dusk)}),color:'var(--blue-hour)'});

  twilightRow.innerHTML=badges.map(b=>
    `<span class="tw-badge"><span class="tw-dot" style="background:${b.color}"></span>${b.label} ${b.time}</span>`
  ).join('');
}

/* =============== COUNTDOWN =============== */
function updateCountdown(sunT){
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null}
  const date=getDate();
  if(!date||!isToday(date)){countdownEl.textContent='';return}
  function tick(){
    const now=new Date();
    const sr=sunT.sunrise, ss=sunT.sunset;
    if(sr instanceof Date&&!isNaN(+sr)&&now<sr){
      const d=sr-now, h=Math.floor(d/36e5), m=Math.floor((d%36e5)/6e4);
      countdownEl.textContent=t('cd_sunrise',{h:pad2(h),m:pad2(m)});
    }else if(ss instanceof Date&&!isNaN(+ss)&&now<ss){
      const d=ss-now, h=Math.floor(d/36e5), m=Math.floor((d%36e5)/6e4);
      countdownEl.textContent=t('cd_sunset',{h:pad2(h),m:pad2(m)});
    }else{
      countdownEl.textContent=t('cd_past');
    }
  }
  tick();
  countdownTimer=setInterval(tick,30000);
}

/* =============== SKY DOME =============== */
function resizeCanvas(){
  const dpr=devicePixelRatio||1, r=skyCanvas.getBoundingClientRect();
  skyCanvas.width=Math.round(r.width*dpr); skyCanvas.height=Math.round(r.height*dpr);
  skyCtx.setTransform(dpr,0,0,dpr,0,0);
}
function proj(azR,altR,w,h){
  const hY=h*.78, L=28, R2=w-28;
  /* azR is already normalized to [0,2π) by callers — do NOT add offset again */
  const x=L+(azR/(Math.PI*2))*(R2-L);
  const n=Math.max(0,Math.sin(Math.max(-Math.PI/2,altR)));
  return{x, y:hY-n*(hY-24), above:altR>=0};
}

function drawSky(date){
  resizeCanvas();
  const w=skyCanvas.clientWidth, h=skyCanvas.clientHeight;
  const hY=h*.78, L=28, R=w-28, c=skyCtx;
  c.clearRect(0,0,w,h);

  /* horizon */
  c.strokeStyle='rgba(255,255,255,.7)';c.lineWidth=1.2;
  c.beginPath();c.moveTo(L,hY);c.lineTo(R,hY);c.stroke();

  /* grid */
  c.strokeStyle='rgba(255,255,255,.08)';c.lineWidth=1;
  for(let i=1;i<=4;i++){const y=hY-(hY-24)*i/5;c.beginPath();c.moveTo(L,y);c.lineTo(R,y);c.stroke()}

  /* labels */
  c.fillStyle='rgba(255,255,255,.6)';c.font='11px sans-serif';c.textAlign='center';
  c.fillText(t('zenith'),w/2,16);
  const dirs=[{b:0,k:'dir_N'},{b:90,k:'dir_E'},{b:180,k:'dir_S'},{b:270,k:'dir_W'}];
  for(const d of dirs){
    const azR=toRad(d.b+180)%(Math.PI*2);
    const x=L+((azR+Math.PI*2.5)%(Math.PI*2))/(Math.PI*2)*(R-L);
    c.strokeStyle='rgba(255,255,255,.5)';c.beginPath();c.moveTo(x,hY-4);c.lineTo(x,hY+4);c.stroke();
    c.fillStyle='rgba(255,255,255,.7)';c.fillText(t(d.k),x,hY+16);
  }
  c.textAlign='start';

  /* sample tracks */
  function sample(body){
    const pts=[];
    for(let m=0;m<=1440;m+=8){
      const t2=new Date(+date+m*6e4);
      const p=body==='sun'?SunCalc.getPosition(t2,lat,lng):SunCalc.getMoonPosition(t2,lat,lng);
      const pp=proj((p.azimuth+Math.PI*2.5)%(Math.PI*2),p.altitude,w,h);
      pp.time=t2; pts.push(pp);
    }
    return pts;
  }
  function drawTrack(pts,color,lw=2){
    c.strokeStyle=color;c.lineWidth=lw;c.beginPath();
    let s=false;
    for(const p of pts){if(!p.above){s=false;continue}if(!s){c.moveTo(p.x,p.y);s=true}else c.lineTo(p.x,p.y)}
    c.stroke();
  }
  function drawDot(time,body,label,color){
    if(!time||isNaN(+time))return;
    const p=body==='sun'?SunCalc.getPosition(time,lat,lng):SunCalc.getMoonPosition(time,lat,lng);
    const pp=proj((p.azimuth+Math.PI*2.5)%(Math.PI*2),p.altitude,w,h);
    const y2=Math.min(hY-2,pp.y);
    c.fillStyle=color;c.beginPath();c.arc(pp.x,y2,4,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,255,255,.8)';c.font='10px sans-serif';
    c.fillText(label,Math.max(6,pp.x-12),y2-8);
  }

  const sunPts=sample('sun'), moonPts=sample('moon');
  /* glow effect for sun */
  c.save();c.shadowColor='rgba(255,203,69,.3)';c.shadowBlur=8;
  drawTrack(sunPts,'#ffcb45',2.5);
  c.restore();
  drawTrack(moonPts,'#7eb8ff',2);

  const h0=getObsH();
  const sunT=SunCalc.getTimes(date,lat,lng,h0);
  const moonT=SunCalc.getMoonTimes(date,lat,lng);
  drawDot(sunT.sunrise,'sun',t('ev_sunrise'),'#ffcb45');
  drawDot(sunT.sunset,'sun',t('ev_sunset'),'#ffcb45');
  drawDot(moonT.rise,'moon',t('ev_moonrise'),'#7eb8ff');
  drawDot(moonT.set,'moon',t('ev_moonset'),'#7eb8ff');

  /* current position marker (if today) */
  if(isToday(date)){
    const now=new Date();
    const sp=SunCalc.getPosition(now,lat,lng);
    const spp=proj((sp.azimuth+Math.PI*2.5)%(Math.PI*2),sp.altitude,w,h);
    if(spp.above){
      c.fillStyle='#fff';c.beginPath();c.arc(spp.x,spp.y,5,0,Math.PI*2);c.fill();
      c.fillStyle='#ffcb45';c.beginPath();c.arc(spp.x,spp.y,3.5,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(255,255,255,.7)';c.font='9px sans-serif';
      c.fillText(t('now_marker'),spp.x+7,spp.y+3);
    }
    const mp=SunCalc.getMoonPosition(now,lat,lng);
    const mpp=proj((mp.azimuth+Math.PI*2.5)%(Math.PI*2),mp.altitude,w,h);
    if(mpp.above){
      c.fillStyle='#fff';c.beginPath();c.arc(mpp.x,mpp.y,5,0,Math.PI*2);c.fill();
      c.fillStyle='#7eb8ff';c.beginPath();c.arc(mpp.x,mpp.y,3.5,0,Math.PI*2);c.fill();
    }
  }

  /* moon phase badge */
  const above=moonPts.filter(p=>p.above);
  if(above.length){
    let peak=above[0];for(const p of above)if(p.y<peak.y)peak=p;
    const mi=SunCalc.getMoonIllumination(peak.time);
    const lb=phaseEmoji(mi.phase)+' '+phaseName(mi.phase);
    const bx=Math.max(10,Math.min(w-130,peak.x+8)),by=Math.max(22,peak.y-10);
    c.fillStyle='rgba(10,22,40,.8)';c.strokeStyle='rgba(255,255,255,.15)';c.lineWidth=1;
    c.beginPath();
    if(c.roundRect)c.roundRect(bx-5,by-12,128,20,6);else c.rect(bx-5,by-12,128,20);
    c.fill();c.stroke();
    c.fillStyle='rgba(255,255,255,.85)';c.font='12px sans-serif';c.fillText(lb,bx,by+2);
  }
}

/* =============== MAP =============== */
function destPt(la,lo,b,d){
  const R=6371e3,br=toRad(b),p1=toRad(la),l1=toRad(lo),ad=d/R;
  const p2=Math.asin(Math.sin(p1)*Math.cos(ad)+Math.cos(p1)*Math.sin(ad)*Math.cos(br));
  const l2=l1+Math.atan2(Math.sin(br)*Math.sin(ad)*Math.cos(p1),Math.cos(ad)-Math.sin(p1)*Math.sin(p2));
  return[toDeg(p2),toDeg(l2)];
}

function drawMapGuides(){
  if(!leafletMap||!guideLayer)return;
  guideLayer.clearLayers();
  if(lat==null)return;
  const D=6e5;
  const {sr,ss,mr,ms}=lastBearings;
  const lines=[
    {b:sr,c:'#ffcb45',w:4,dash:null,tip:t('leg_sunrise')},
    {b:ss,c:'#e76f51',w:4,dash:null,tip:t('leg_sunset')},
    {b:mr,c:'#7eb8ff',w:3.5,dash:'8,5',tip:t('leg_moonrise')},
    {b:ms,c:'#3d7cc9',w:3.5,dash:'8,5',tip:t('leg_moonset')},
  ];
  for(const l of lines){
    if(!Number.isFinite(l.b))continue;
    const end=destPt(lat,lng,l.b,D);
    L.polyline([[lat,lng],end],{color:'#fff',weight:l.w+3,opacity:.35,lineCap:'round'}).addTo(guideLayer);
    const opt={color:l.c,weight:l.w,opacity:1,lineCap:'round'};
    if(l.dash) opt.dashArray=l.dash;
    L.polyline([[lat,lng],end],opt).bindTooltip(l.tip).addTo(guideLayer);
  }
  // target line
  const tla=parseFloat($('tgtLat').value),tlo=parseFloat($('tgtLng').value);
  if(Number.isFinite(tla)&&Number.isFinite(tlo))
    L.polyline([[lat,lng],[tla,tlo]],{color:'#fff',weight:1.5,opacity:.8,dashArray:'6,4'}).addTo(guideLayer);
}

function initMap(){
  if(!window.L)return;
  leafletMap=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([30,105],3);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(leafletMap);
  guideLayer=L.layerGroup().addTo(leafletMap);

  const ctrl=L.control({position:'topright'});
  ctrl.onAdd=function(){
    const c=L.DomUtil.create('div','leaflet-control sm-actions');
    mapLocateBtn=L.DomUtil.create('button','',c);
    mapLocateBtn.type='button';mapLocateBtn.addEventListener('click',doLocate);
    mapClearBtn=L.DomUtil.create('button','',c);
    mapClearBtn.type='button';mapClearBtn.addEventListener('click',clearAll);
    L.DomEvent.disableClickPropagation(c);
    return c;
  };
  ctrl.addTo(leafletMap);

  leafletMap.on('click',e=>{
    const adv=$('advSection').open;
    if(adv){
      if(advPickStep%2===0){
        lat=e.latlng.lat;lng=e.latlng.lng;
        $('obsLat').value=lat.toFixed(6);$('obsLng').value=lng.toFixed(6);
        setObsMk(lat,lng);
        savePos(); render();
      }else{
        $('tgtLat').value=e.latlng.lat.toFixed(6);
        $('tgtLng').value=e.latlng.lng.toFixed(6);
        setTgtMk(e.latlng.lat,e.latlng.lng);
        updateAdvanced(getDate());
        drawMapGuides();
      }
      advPickStep++;
    }else{
      lat=e.latlng.lat;lng=e.latlng.lng;
      setObsMk(lat,lng);
      leafletMap.setView([lat,lng],Math.max(leafletMap.getZoom(),10));
      savePos(); render(); updateHash();
      setStatus(t('status_map_click',{lat:lat.toFixed(4),lng:lng.toFixed(4)}),true);
    }
  });

  /* redraw guides on map move — use cached bearings */
  leafletMap.on('zoomend moveend',()=>drawMapGuides());
}

function setObsMk(la,lo){
  if(!leafletMap)return;
  if(!obsMarker) obsMarker=L.circleMarker([la,lo],{radius:7,color:'#4ade80',weight:2,fillOpacity:.9}).addTo(leafletMap);
  else obsMarker.setLatLng([la,lo]);
}
function setTgtMk(la,lo){
  if(!leafletMap)return;
  if(!tgtMarker) tgtMarker=L.marker([la,lo]).addTo(leafletMap);
  else tgtMarker.setLatLng([la,lo]);
}
function clearAll(){
  if(obsMarker&&leafletMap){leafletMap.removeLayer(obsMarker);obsMarker=null}
  if(tgtMarker&&leafletMap){leafletMap.removeLayer(tgtMarker);tgtMarker=null}
  if(guideLayer)guideLayer.clearLayers();
  advPickStep=0;$('tgtLat').value='';$('tgtLng').value='';
  advResult.style.display='none';advResult.innerHTML='';
}

/* =============== LOCATE =============== */
function doLocate(){
  if(!navigator.geolocation){setStatus(t('status_geo_no'));return}
  const btn=$('locateBtn');
  btn.classList.add('loading');btn.classList.remove('cta-pulse');
  setStatus(t('status_locating'));
  navigator.geolocation.getCurrentPosition(pos=>{
    btn.classList.remove('loading');
    lat=pos.coords.latitude;lng=pos.coords.longitude; savePos();
    setObsMk(lat,lng);
    if(leafletMap)leafletMap.setView([lat,lng],12);
    $('obsLat').value=lat.toFixed(6);$('obsLng').value=lng.toFixed(6);
    render(); updateHash();
  },err=>{
    btn.classList.remove('loading');
    setStatus(t('status_geo_fail',{msg:err.message||'Unknown'}));
  },{enableHighAccuracy:true,timeout:12000,maximumAge:120000});
}

/* =============== ADVANCED =============== */
function haversine(a1,o1,a2,o2){
  const R=6371e3,dp=toRad(a2-a1),dl=toRad(o2-o1);
  const a=Math.sin(dp/2)**2+Math.cos(toRad(a1))*Math.cos(toRad(a2))*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing2(a1,o1,a2,o2){
  const p1=toRad(a1),p2=toRad(a2),dl=toRad(o2-o1);
  return normB(toDeg(Math.atan2(Math.sin(dl)*Math.cos(p2),Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl))));
}
function shortA(a,b){return((b-a+540)%360)-180}

function findPass(oLa,oLo,tgtB,start,ev,n=2){
  const scan=550,tol=.35,ser=[];
  const s0=new Date(start);s0.setHours(0,0,0,0);
  for(let i=0;i<=scan;i++){
    const d=new Date(+s0+i*864e5);
    const tm=SunCalc.getTimes(d,oLa,oLo,getObsH())[ev];
    if(!tm||isNaN(+tm))continue;
    const b=evBearing(tm,oLa,oLo,'sun');
    if(!Number.isFinite(b))continue;
    const se=shortA(tgtB,b);
    ser.push({day:d,time:tm,se,ae:Math.abs(se)});
  }
  if(!ser.length)return[];
  const cands=[];
  for(let i=0;i<ser.length-1;i++){
    const a=ser[i],b=ser[i+1];
    if(a.ae<=tol)cands.push(a);
    if(a.se*b.se<0)cands.push(a.ae<=b.ae?a:b);
  }
  if(ser[ser.length-1].ae<=tol)cands.push(ser[ser.length-1]);
  const uniq=[];
  for(const c of cands.sort((a,b)=>a.time-b.time)){
    const p=uniq[uniq.length-1];
    if(!p||Math.abs(Math.round((c.day-p.day)/864e5))>3)uniq.push(c);
    else if(c.ae<p.ae)uniq[uniq.length-1]=c;
  }
  return uniq.slice(0,n);
}

function updateAdvanced(date){
  if(!date)return;
  const oLa=parseFloat($('obsLat').value),oLo=parseFloat($('obsLng').value);
  const tLa=parseFloat($('tgtLat').value),tLo=parseFloat($('tgtLng').value);
  if(!Number.isFinite(oLa)||!Number.isFinite(oLo)||!Number.isFinite(tLa)||!Number.isFinite(tLo)){
    advResult.style.display='none';return;
  }
  advResult.style.display='';
  const tgtB=bearing2(oLa,oLo,tLa,tLo);
  const dist=(haversine(oLa,oLo,tLa,tLo)/1000).toFixed(1);
  const riseH=findPass(oLa,oLo,tgtB,date,'sunrise',2);
  const setH=findPass(oLa,oLo,tgtB,date,'sunset',2);
  const fmt=a=>a.length?a.map(x=>t('adv_item',{date:fmtDate(x.day),time:fmtTime(x.time),err:x.ae.toFixed(2)})).join('；'):t('adv_none');
  advResult.innerHTML=`<div style="margin-bottom:6px">${t('adv_bearing',{deg:tgtB.toFixed(1),name:bearName(tgtB),dist})}</div><strong>${t('adv_pass_event')}</strong><br>☀️ ${t('adv_rise_pass')}：${fmt(riseH)}<br>🌇 ${t('adv_set_pass')}：${fmt(setH)}`;
}

/* =============== PERSISTENCE =============== */
function savePos(){try{localStorage.setItem('sm.lat',String(lat));localStorage.setItem('sm.lng',String(lng))}catch(e){}}
function loadPos(){
  try{const a=parseFloat(localStorage.getItem('sm.lat')),o=parseFloat(localStorage.getItem('sm.lng'));
    if(Number.isFinite(a)&&Number.isFinite(o)){lat=a;lng=o;return true}}catch(e){}
  return false;
}

/* =============== DATE CONTROLS =============== */
function stepDay(delta){
  const d=getDate();if(!d)return;
  const nd=new Date(+d+delta*864e5);
  dateInput.value=fmtDI(nd);syncSlider();render();updateHash();
}
function syncSlider(){
  const d=getDate();if(!d)return;
  const dy=doy(d);
  dateSlider.max=String(daysInY(d.getFullYear()));
  dateSlider.value=String(dy);
  sliderLabel.textContent=t('slider_day',{date:fmtDate(d),doy:dy});
}

/* --- Lightweight render for slider drag (skips canvas / map / advanced) --- */
function getQuickPreviewData(date){
  if(lat==null||lng==null||!date)return null;
  const h0=getObsH();
  const sunT=SunCalc.getTimes(date,lat,lng,h0);
  const moonT=SunCalc.getMoonTimes(date,lat,lng);
  const moonI=SunCalc.getMoonIllumination(date);
  const qB=(time,body)=>{
    if(!time||isNaN(+time))return NaN;
    const p=body==='sun'?SunCalc.getPosition(time,lat,lng):SunCalc.getMoonPosition(time,lat,lng);
    return scAzToB(p.azimuth);
  };
  return {
    sunT,moonT,moonI,
    srB:qB(sunT.sunrise,'sun'),
    ssB:qB(sunT.sunset,'sun'),
    mrB:qB(moonT.rise,'moon'),
    msB:qB(moonT.set,'moon'),
  };
}
function renderLite(){
  const date=getDate();if(!date)return;
  const preview=getQuickPreviewData(date);if(!preview)return;
  const {sunT,moonT,moonI,srB,ssB,mrB,msB}=preview;
  lastBearings={sr:srB,ss:ssB,mr:mrB,ms:msB};
  $('evSunriseTime').textContent=fmtTime(sunT.sunrise);
  $('evSunriseDir').textContent=fmtBear(srB);
  $('compassSunrise').innerHTML=compassSVG(srB,'var(--sun)');
  $('evSunsetTime').textContent=fmtTime(sunT.sunset);
  $('evSunsetDir').textContent=fmtBear(ssB);
  $('compassSunset').innerHTML=compassSVG(ssB,'var(--sunset)');
  $('evMoonriseTime').textContent=fmtTime(moonT.rise);
  $('evMoonriseDir').textContent=fmtBear(mrB);
  $('compassMoonrise').innerHTML=compassSVG(mrB,'var(--moon)');
  $('evMoonsetTime').textContent=fmtTime(moonT.set);
  $('evMoonsetDir').textContent=fmtBear(msB);
  $('compassMoonset').innerHTML=compassSVG(msB,'var(--moonset)');
  $('kpiNoon').textContent=fmtTime(sunT.solarNoon);
  const dayMs=(sunT.sunrise&&sunT.sunset)?sunT.sunset-sunT.sunrise:NaN;
  $('kpiDayLen').textContent=fmtDur(dayMs);
  $('kpiMoonIllum').textContent=(moonI.fraction*100).toFixed(1)+'%';
  $('kpiMoonPhase').textContent=phaseEmoji(moonI.phase)+' '+phaseName(moonI.phase);
  renderTwilight(sunT);
  drawMapGuides();
  setStatus(t('status_ok',{lat:lat.toFixed(4),lng:lng.toFixed(4),date:fmtDate(date)}),true);
}

function previewMapGuidesLite(){
  const date=getDate();if(!date)return;
  const preview=getQuickPreviewData(date);if(!preview)return;
  lastBearings={sr:preview.srB,ss:preview.ssB,mr:preview.mrB,ms:preview.msB};
  drawMapGuides();
}

/* --- Drag-aware slider handling --- */
let _sliderDragging=false, _sliderThrottle=null;
const _COARSE_POINTER=window.matchMedia&&window.matchMedia('(pointer:coarse)').matches;
const _SLIDER_MS=90;
dateSlider.addEventListener('pointerdown',()=>{_sliderDragging=true},{passive:true});
dateSlider.addEventListener('touchstart',()=>{_sliderDragging=true},{passive:true});
function _sliderRelease(){
  if(!_sliderDragging)return;
  _sliderDragging=false;
  if(_sliderThrottle){clearTimeout(_sliderThrottle);_sliderThrottle=null}
  render();
}
dateSlider.addEventListener('pointerup',_sliderRelease);
dateSlider.addEventListener('pointercancel',_sliderRelease);
dateSlider.addEventListener('lostpointercapture',_sliderRelease);
dateSlider.addEventListener('touchend',_sliderRelease,{passive:true});
dateSlider.addEventListener('touchcancel',_sliderRelease,{passive:true});

dateInput.addEventListener('change',()=>{syncSlider();render();updateHash()});
dateSlider.addEventListener('input',()=>{
  const d=getDate();if(!d)return;
  const nd=doyToDate(d.getFullYear(),+dateSlider.value);
  dateInput.value=fmtDI(nd);
  /* label updates instantly — zero jank */
  sliderLabel.textContent=t('slider_day',{date:fmtDate(nd),doy:+dateSlider.value});
  if(_sliderDragging){
    /* throttled lightweight render during drag */
    if(!_sliderThrottle){
      _sliderThrottle=setTimeout(()=>{
        _sliderThrottle=null;
        if(_COARSE_POINTER) previewMapGuidesLite();
        else renderLite();
      },_SLIDER_MS);
    }
  }else{
    /* keyboard / programmatic — full render */
    render();
  }
});
function jumpToToday(){
  dateInput.value=fmtDI(new Date());syncSlider();render();updateHash();
}
function bindRepeatStep(btn,delta){
  let holdTimer=null, repeatTimer=null, repeating=false, suppressClick=false;
  const clear=()=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    if(repeatTimer){clearInterval(repeatTimer);repeatTimer=null}
    repeating=false;
  };
  const start=()=>{
    clear();
    holdTimer=setTimeout(()=>{
      repeating=true;
      suppressClick=true;
      stepDay(delta);
      repeatTimer=setInterval(()=>stepDay(delta),120);
    },280);
  };
  btn.addEventListener('pointerdown',e=>{
    if(e.button!==undefined&&e.button!==0)return;
    e.preventDefault();
    start();
  });
  btn.addEventListener('pointerup',clear);
  btn.addEventListener('pointercancel',clear);
  btn.addEventListener('pointerleave',clear);
  btn.addEventListener('lostpointercapture',clear);
  btn.addEventListener('click',e=>{
    e.preventDefault();
    if(suppressClick){suppressClick=false;return}
    if(repeating)return;
    clear();
    stepDay(delta);
  });
}
$('todayBtn').addEventListener('click',jumpToToday);
$('locateBtn').addEventListener('click',doLocate);
bindRepeatStep($('prevDayBtn'),-1);
bindRepeatStep($('nextDayBtn'),1);
langSel.addEventListener('change',()=>setLang(langSel.value));
['obsLat','obsLng','tgtLat','tgtLng','tgtElev','obsElev'].forEach(id=>{
  $(id).addEventListener('change',()=>{updateAdvanced(getDate());drawMapGuides()})
});
window.addEventListener('resize',()=>{if(lat!=null)render()});

document.addEventListener('dblclick',e=>{
  if(e.target.closest('.action-bar,.slider-row')) e.preventDefault();
},{passive:false});

/* keyboard: ← → to change date */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    stepDay(e.key==='ArrowRight'?1:-1);
  }
});

/* =============== SWIPE GESTURE =============== */
(function(){
  let sx=0,sy=0,swiping=false;
  const main=document.querySelector('.main-grid');
  if(!main)return;
  main.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=true;
  },{passive:true});
  main.addEventListener('touchmove',e=>{
    if(!swiping||e.touches.length!==1)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)*1.8&&Math.abs(dx)>50){
      swiping=false;stepDay(dx<0?1:-1);
    }
  },{passive:true});
  main.addEventListener('touchend',()=>{swiping=false},{passive:true});
})();

/* =============== URL HASH =============== */
function updateHash(){
  const parts=[];
  if(lat!=null&&lng!=null){parts.push('lat='+lat.toFixed(4),'lng='+lng.toFixed(4))}
  const d=getDate();
  if(d)parts.push('date='+fmtDI(d));
  history.replaceState(null,'','#'+parts.join('&'));
}
function readHash(){
  const h=location.hash.slice(1);if(!h)return false;
  const p=Object.fromEntries(h.split('&').map(s=>s.split('=')));
  let got=false;
  if(p.lat&&p.lng){
    const la=parseFloat(p.lat),lo=parseFloat(p.lng);
    if(Number.isFinite(la)&&Number.isFinite(lo)){lat=la;lng=lo;got=true}
  }
  if(p.date&&/^\d{4}-\d{2}-\d{2}$/.test(p.date)){
    const d=new Date(p.date+'T00:00:00');
    if(!isNaN(+d)){dateInput.value=p.date;syncSlider()}
  }
  return got;
}

/* =============== SHARE =============== */
function showToast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}
$('shareBtn').addEventListener('click',()=>{
  updateHash();
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast(t('toast_copied'))).catch(()=>showToast(t('toast_copy_fail')));
  }else{
    /* fallback */
    const ta=document.createElement('textarea');ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast(t('toast_copied'))}catch(e){showToast(t('toast_copy_fail'))}
    ta.remove();
  }
});

/* =============== INIT =============== */
(function init(){
  const saved=localStorage.getItem('sm.lang');
  const LS=new Set(Object.keys(I18N));
  if(saved&&LS.has(saved))lang=saved;
  else{const r=(navigator.language||'en').toLowerCase();
    if(r.startsWith('zh'))lang='zh';else if(r.startsWith('ja'))lang='ja';
    else if(r.startsWith('ko'))lang='ko';else if(r.startsWith('fr'))lang='fr';
    else if(r.startsWith('es'))lang='es';else lang='en';
  }
  document.documentElement.lang=lang;
  applyI18n();
  dateInput.value=fmtDI(new Date());syncSlider();
  initMap();
  /* URL hash overrides saved pos & date */
  const fromHash=readHash();
  if(fromHash){
    setObsMk(lat,lng);$('obsLat').value=lat.toFixed(6);$('obsLng').value=lng.toFixed(6);
    if(leafletMap)leafletMap.setView([lat,lng],10);
    savePos();render();updateHash();
  }else if(loadPos()){
    setObsMk(lat,lng);$('obsLat').value=lat.toFixed(6);$('obsLng').value=lng.toFixed(6);
    if(leafletMap)leafletMap.setView([lat,lng],10);
    render();updateHash();
  }else{
    /* first visit: auto-locate */
    setStatus(t('status_hint'));
    resizeCanvas();
    const w=skyCanvas.clientWidth,h=skyCanvas.clientHeight;
    skyCtx.clearRect(0,0,w,h);
    skyCtx.fillStyle='rgba(255,255,255,.25)';skyCtx.font='13px sans-serif';
    const hint=t('status_hint');
    const tw=skyCtx.measureText(hint).width;
    skyCtx.fillText(hint,(w-tw)/2,h/2);
    doLocate();
  }
})();
</script>
